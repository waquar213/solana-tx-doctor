<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sol" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0E16"/>
      <stop offset="1" stop-color="#111726"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9945FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9945FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowG" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14F195" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#14F195" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="22" fill="url(#bg)"/>
  <circle cx="170" cy="90" r="280" fill="url(#glowP)"/>
  <circle cx="1080" cy="250" r="300" fill="url(#glowG)"/>
  <rect x="2" y="2" width="1196" height="316" rx="21" fill="none" stroke="#1E2A3E" stroke-width="2"/>

  <!-- Logo: hexagon node + medical cross + pulse -->
  <g transform="translate(120,160)">
    <polygon points="72,0 36,62.4 -36,62.4 -72,0 -36,-62.4 36,-62.4" fill="none" stroke="url(#sol)" stroke-width="6"/>
    <polygon points="72,0 36,62.4 -36,62.4 -72,0 -36,-62.4 36,-62.4" fill="#9945FF" fill-opacity="0.08"/>
    <!-- medical cross -->
    <g fill="#E6EDF3">
      <rect x="-9" y="-34" width="18" height="68" rx="5"/>
      <rect x="-34" y="-9" width="68" height="18" rx="5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="248" y="135" font-size="52" font-weight="800" fill="#E6EDF3" letter-spacing="-1">Solana Transaction Doctor</text>
  <text x="250" y="178" font-size="23" font-weight="500" fill="#9FB0C3">Diagnose &amp; fix failed, reverted, or dropped Solana transactions</text>

  <!-- Pulse line (transaction vitals) -->
  <polyline points="250,210 360,210 380,210 396,178 416,244 436,210 470,210 488,194 506,226 524,210 1120,210"
            fill="none" stroke="#14F195" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Process pill -->
  <g transform="translate(250,238)">
    <rect x="0" y="0" width="372" height="44" rx="22" fill="#0E1626" stroke="url(#sol)" stroke-width="1.5"/>
    <text x="186" y="29" text-anchor="middle" font-size="18" font-weight="700" fill="#E6EDF3" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">decode → explain → fix → verify</text>
  </g>

  <!-- Tag -->
  <g transform="translate(660,238)">
    <rect x="0" y="0" width="210" height="44" rx="22" fill="#0E1626" stroke="#1E2A3E" stroke-width="1.5"/>
    <circle cx="26" cy="22" r="6" fill="#14F195"/>
    <text x="44" y="29" font-size="16" font-weight="600" fill="#9FB0C3" font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">Solana AI Kit · MIT</text>
  </g>
</svg>
